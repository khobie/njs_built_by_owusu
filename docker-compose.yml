# Local PostgreSQL for development. From project root:
#   docker compose up -d
# Then copy .env.example → .env (or set DATABASE_URL below), then:
#   npx prisma db push
#   npm run db:seed

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: njs_form_system
    ports:
      - "5432:5432"
    volumes:
      - njs_pg_data:/var/lib/postgresql/data

volumes:
  njs_pg_data:
